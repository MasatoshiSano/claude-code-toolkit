version: "1.0.0"
description: "Security scanning rules for code quality suite"

dependency_vulnerabilities:
  severity_thresholds:
    critical:
      max_allowed: 0
      action: "Block deployment"
    high:
      max_allowed: 0
      action: "Require review"
    moderate:
      max_allowed: 5
      action: "Monitor"
    low:
      max_allowed: 10
      action: "Track"

secret_detection:
  patterns:
    aws_access_key:
      pattern: "AKIA[0-9A-Z]{16}"
      severity: "critical"
      description: "AWS Access Key ID"

    private_key:
      pattern: "-----BEGIN (RSA |EC )?PRIVATE KEY-----"
      severity: "critical"
      description: "Private cryptographic key"

    password_in_code:
      pattern: "password\\s*=\\s*['\"]"
      severity: "high"
      description: "Hardcoded password"

    api_key:
      pattern: "api[_-]?key\\s*=\\s*['\"]"
      severity: "high"
      description: "API key in code"

    auth_token:
      pattern: "auth[_-]?token\\s*=\\s*['\"]"
      severity: "high"
      description: "Authentication token"

    generic_secret:
      pattern: "secret\\s*=\\s*['\"]"
      severity: "medium"
      description: "Generic secret"

  exclusions:
    file_patterns:
      - "*.test.js"
      - "*.spec.ts"
      - ".env.example"
      - "package-lock.json"

    directory_patterns:
      - "node_modules"
      - ".git"
      - "dist"
      - "build"

best_practices:
  authentication:
    - "Use environment variables for credentials"
    - "Never commit secrets to version control"
    - "Implement secret rotation policies"
    - "Use secret management services (AWS Secrets Manager, HashiCorp Vault)"

  dependencies:
    - "Keep dependencies up to date"
    - "Review security advisories regularly"
    - "Use npm audit or similar tools in CI/CD"
    - "Pin dependency versions in production"

  code_security:
    - "Validate all user inputs"
    - "Use parameterized queries to prevent SQL injection"
    - "Implement proper error handling"
    - "Apply principle of least privilege"

owasp_top_10:
  - name: "A01:2021 - Broken Access Control"
    checks:
      - "Authorization checks on all endpoints"
      - "Proper session management"

  - name: "A02:2021 - Cryptographic Failures"
    checks:
      - "Use strong encryption algorithms"
      - "Secure key management"

  - name: "A03:2021 - Injection"
    checks:
      - "Input validation and sanitization"
      - "Parameterized queries"

  - name: "A04:2021 - Insecure Design"
    checks:
      - "Threat modeling"
      - "Secure design patterns"

  - name: "A05:2021 - Security Misconfiguration"
    checks:
      - "Remove default credentials"
      - "Disable unnecessary features"

  - name: "A06:2021 - Vulnerable and Outdated Components"
    checks:
      - "Regular dependency updates"
      - "Vulnerability scanning"

  - name: "A07:2021 - Identification and Authentication Failures"
    checks:
      - "Strong password policies"
      - "Multi-factor authentication"

  - name: "A08:2021 - Software and Data Integrity Failures"
    checks:
      - "Code signing"
      - "Integrity verification"

  - name: "A09:2021 - Security Logging and Monitoring Failures"
    checks:
      - "Comprehensive logging"
      - "Real-time monitoring"

  - name: "A10:2021 - Server-Side Request Forgery"
    checks:
      - "URL validation"
      - "Network segmentation"
