# Deployment Strategy Configuration

blueGreen:
  enabled: true
  trafficShiftPercentage: 10
  intervalMinutes: 5
  rollbackOnFailure: true

canary:
  enabled: true
  steps:
    - percentage: 10
      durationMinutes: 5
    - percentage: 50
      durationMinutes: 10
    - percentage: 100
      durationMinutes: 0

rolling:
  enabled: true
  batchSize: 1
  pauseTime: PT5M

allAtOnce:
  enabled: false
  description: Deploy to all instances simultaneously (high risk)
